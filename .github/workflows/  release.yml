name: Release

on:
  push:
    tags:
      - 'v*'
      
permissions:
  packages: write
  contents: read
      
env:
  DOTNET_VERSION: '10.0.x'
  LIBRARY_PROJECT: src/SecretStore.Core/SecretStore.Core.csproj
  CLI_PROJECT: src/SecretStore.CLI/SecretStore.CLI.csproj

jobs:

  package:
    runs-on: ubuntu-latest
    
    steps:

    - name: Checkout
      uses: actions/checkout@v7
  
    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Determine Version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

    - name: Restore
      run: dotnet restore

    - name: Build
      run: >
        dotnet build 
        --configuration Release 
        --no-restore

    - name: Pack Library
      run: >
        dotnet pack 
        ${{ env.LIBRARY_PROJECT }}
        --configuration Release 
        --no-build 
        --output ./artifacts

    - name: Publish NuGet Package
      run: >
        dotnet nuget push 
        "./artifacts/*.nupkg" 
        --source https://nuget.pkg.github.com/eamonnwatson/index.json 
        --api-key ${{ secrets.NUGET_API_KEY }} 
        --skip-duplicate

  cli:
    needs: package

    strategy:
      matrix:
        include:

          - runner: windows-latest
            rid: win-x64
            archive: zip

          - runner: macos-latest
            rid: osx-arm64
            archive: zip

    runs-on: ${{ matrix.runner }}

    steps:

      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Native AOT
        shell: bash
        run: |
          dotnet publish ${{ env.CLI_PROJECT }} \
          --configuration Release \
          -r ${{ matrix.rid }} \
          --self-contained true \
          -p:PublishAot=true \
          -p:PublishSingleFile=true \ 
          -o publish

      - name: Archive (Windows)
        if: matrix.runner == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path publish/* `
            -DestinationPath SecretStore-${{ matrix.rid }}.zip

      - name: Archive (macOS)
        if: matrix.runner == 'macos-latest'
        shell: bash
        run: |
          cd publish
          zip -r ../SecretStore-${{ matrix.rid }}.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SecretStore-${{ matrix.rid }}
          path: SecretStore-${{ matrix.rid }}.zip

  release:

    needs:
      - package
      - cli

    runs-on: ubuntu-latest

    steps:

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display Files
        run: find artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/SecretStore-win-x64/SecretStore-win-x64.zip
            artifacts/SecretStore-osx-arm64/SecretStore-osx-arm64.zip
